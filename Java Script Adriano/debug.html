        function verificarAprovacao( n1, n2, n3) {
            let media = (n1 + n2 + n3) / 3;
            if (media >= 7) {
                return "Aprovado com média: " + media;
            } else { 
                return "Reprovado com média: " + media;
            }
        }

    </script>

            if (idade >= 13 && idade <= 17) {

            }

            return "Outra categoria"
            
            /*O && verifica se as duas perguntas são verdadeiras, ao trocar && por ||,
             as barras só perguntam a primeira afirmação. || se idade for > 13 = adolescente, se idade for 40 = adolescente, pois é maior que 13. 
             Com && ela pergunta se idade for > 13 e < 17 = adolescente, se não, outra categoria. */
        }

    </script>
