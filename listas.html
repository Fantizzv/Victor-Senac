    <script>

        function calcularFatorial(n) {
            let fatorial = 0

            for (let i=1; i<= n; i++) {
                fatorial = fatorial * i
            }

            return fatorial

        }

    </script>


    <script>
        function calcularFatorial(n) {
            let fatorial = 1;

            for (let x=1; x <= n; x++) {

            }
